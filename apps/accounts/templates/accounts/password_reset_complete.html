{% extends "_anonymous_base.html" %}

{% block title %}Passwort gesetzt | CSFV{% endblock %}
{% block header_title %}Betreuer-Portal{% endblock %}

{% block content %}
<section class="flex-1 flex items-center justify-center px-4 py-16 sm:py-24"
         aria-labelledby="pwd-set-heading">
    <div class="w-full max-w-md text-center">

        <div class="card-padded">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-green-100 mb-4"
                 aria-hidden="true">
                <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h2 id="pwd-set-heading" class="text-xl font-semibold text-credo-dark mb-2">
                Passwort gesetzt
            </h2>
            <p class="text-sm text-neutral-600 mb-6">
                Ihr Passwort wurde erfolgreich gesetzt. Sie koennen sich jetzt anmelden.
            </p>

            <a href="{% url 'accounts:login' %}" class="btn-primary">
                Zum Login
            </a>
        </div>
    </div>
</section>
{% endblock %}
