{# HTMX partial: Inline form for creating/editing a time entry. #}
<form method="post"
      action="{% if entry %}{% url 'timetracking:time_entry_update' entry.pk %}{% else %}{% url 'timetracking:time_entry_create' %}{% endif %}"
      class="grid grid-cols-2 md:grid-cols-7 gap-3 items-end bg-gray-50 p-4 rounded-md">
    {% csrf_token %}
    {{ form.contract }}
    <div>
        <label for="id_date" class="block text-xs text-gray-500 mb-1">Datum</label>
        {{ form.date }}
    </div>
    <div>
        <label for="id_start_time" class="block text-xs text-gray-500 mb-1">Von</label>
        {{ form.start_time }}
    </div>
    <div>
        <label for="id_end_time" class="block text-xs text-gray-500 mb-1">Bis</label>
        {{ form.end_time }}
    </div>
    <div>
        <label for="id_break_minutes" class="block text-xs text-gray-500 mb-1">Pause (Min.)</label>
        {{ form.break_minutes }}
    </div>
    <div>
        <label for="id_foerderprogramm" class="block text-xs text-gray-500 mb-1">F&ouml;rderprogramm</label>
        {{ form.foerderprogramm }}
    </div>
    <div>
        <label for="id_description" class="block text-xs text-gray-500 mb-1">Beschreibung</label>
        {{ form.description }}
    </div>
    <div>
        <button type="submit"
                class="w-full bg-credo-dark hover:bg-gray-700 text-white text-sm font-medium py-2 px-4 rounded-md transition-colors">
            {% if entry %}Aktualisieren{% else %}Speichern{% endif %}
        </button>
    </div>
</form>
