[pytest]
DJANGO_SETTINGS_MODULE = betreuer_project.settings.test
python_files = tests.py test_*.py *_tests.py
addopts =
    --strict-markers
    --strict-config
    --reuse-db
    -ra
    --tb=short
markers =
    slow: Marks tests as slow (e.g. WeasyPrint PDF generation). Can be skipped with -m "not slow".
filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:django.utils.encoding.*
