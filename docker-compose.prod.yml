# Production Docker Compose configuration
# Usage on server: docker compose -f docker-compose.prod.yml up -d
#
# Key differences from dev (docker-compose.yml):
#   - Uses Waitress WSGI server (not Django runserver)
#   - No source code volume mount (code is baked into image)
#   - PostgreSQL port not exposed externally
#   - restart: unless-stopped on all services
#   - HTTP/3 (UDP 443) enabled on Caddy

services:
  django:
    build: .
    container_name: betreuer_django
    # No 'command' override → Dockerfile CMD is used (Waitress)
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: betreuer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No port 5432 exposed – only accessible within Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: betreuer_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 support
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - static_files:/srv/static
      - media_files:/srv/media
    depends_on:
      - django

volumes:
  postgres_data:
  static_files:
  media_files:
  caddy_data:
  caddy_config:
