# =====================================================================
# Production-Baseline
# =====================================================================
# Dev laedt zusaetzlich docker-compose.override.yml automatisch
# (Source-Mount, runserver, exponierte Ports).
#
# Start dev:  docker compose up -d
# Start prod: docker compose -f docker-compose.yml up -d
#
# Caddy laeuft NICHT in diesem Compose -- ein Host-Caddy auf dem Server
# uebernimmt TLS + Reverse-Proxy. Django + Host-Caddy teilen sich das
# externe Docker-Netzwerk "reverse_proxy".
# Vor dem ersten Start auf dem Server einmalig:
#   docker network create reverse_proxy
# =====================================================================

services:
  django:
    build: .
    container_name: betreuer_django
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=postgres
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal
      - reverse_proxy

  postgres:
    image: postgres:16-alpine
    container_name: betreuer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # Background-Worker fuer django-q2 (PDF-Erstellung, n8n-Calls, Renewal-Checks).
  # Muss laufen, damit async_task-Jobs abgearbeitet werden.
  django_q:
    build: .
    container_name: betreuer_django_q
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=postgres
    command: python manage.py qcluster
    volumes:
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  static_files:
  media_files:

networks:
  internal:
  reverse_proxy:
    external: true
